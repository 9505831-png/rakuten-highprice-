<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家電アフィリエイト投稿ジェネレーター</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      color: #e8eaf0;
    }

    header {
      background: #16161d;
      border-bottom: 1px solid #2a2a38;
      padding: 22px 24px 18px;
      text-align: center;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.05em;
    }
    header p {
      font-size: 0.72rem;
      color: #6b7190;
      margin-top: 5px;
      letter-spacing: 0.04em;
    }

    .badge-strip {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }
    .badge-elec { background: #1e2540; color: #7b8fff; border: 1px solid #3a4070; }
    .badge-price { background: #1e2f1e; color: #6ddf6d; border: 1px solid #3a603a; }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 16px 80px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 取得ボタン */
    .fetch-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 24px rgba(79,70,229,0.4);
      letter-spacing: 0.04em;
      font-family: inherit;
    }
    .fetch-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    .fetch-btn:active { transform: scale(0.98); }
    .fetch-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ステータス */
    .status {
      text-align: center;
      font-size: 0.82rem;
      color: #6b7190;
      min-height: 20px;
    }
    .status.error { color: #f87171; font-weight: 700; }

    /* 商品カード */
    .product-card {
      background: #16161d;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 20px;
      display: none;
      gap: 16px;
      align-items: flex-start;
    }
    .product-card.visible { display: flex; }

    .product-img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #2a2a38;
      background: #1e1e28;
      flex-shrink: 0;
    }

    .product-info { flex: 1; min-width: 0; }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      font-size: 0.67rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .product-name {
      font-size: 0.87rem;
      font-weight: 700;
      color: #e8eaf0;
      line-height: 1.6;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: #6ddf6d;
      display: block;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .product-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-top: 4px;
    }
    .product-review { color: #f59e0b; font-size: 0.74rem; font-weight: 700; }
    .product-shop   { color: #6b7190; font-size: 0.74rem; }

    /* 投稿文カード */
    .post-card {
      background: #16161d;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .post-card.visible { display: flex; }

    .post-card-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: #6b7190;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 14px;
      font-size: 0.87rem;
      font-family: inherit;
      line-height: 1.75;
      color: #e8eaf0;
      background: #0f0f13;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #4f46e5; }

    .char-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .char-count { font-size: 0.74rem; font-weight: 700; color: #4a4f6b; }
    .char-count.warn { color: #f59e0b; }
    .char-count.over { color: #f87171; }

    .regen-btn {
      padding: 5px 12px;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      font-size: 0.74rem;
      font-weight: 700;
      color: #6b7190;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .regen-btn:hover { background: #2a2a38; color: #e8eaf0; }

    /* ボタン行 */
    .btn-row { display: flex; gap: 10px; }

    .copy-btn {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(79,70,229,0.3);
      font-family: inherit;
    }
    .copy-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .copy-btn.copied {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 4px 16px rgba(34,197,94,0.25);
    }

    .threads-btn {
      flex: 1;
      padding: 14px;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      color: #e8eaf0;
      font-size: 0.92rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-family: inherit;
    }
    .threads-btn:hover { background: #2a2a38; transform: translateY(-1px); }
    .threads-icon { width: 16px; height: 16px; fill: #e8eaf0; flex-shrink: 0; }

    /* アフィリエイトリンクプレビュー */
    .aff-link {
      font-size: 0.7rem;
      color: #4a4f6b;
      word-break: break-all;
      padding: 8px 12px;
      background: #0f0f13;
      border-radius: 8px;
      border: 1px solid #2a2a38;
    }
    .aff-link a { color: #7b8fff; text-decoration: none; }
    .aff-link a:hover { text-decoration: underline; }

    /* 認証カード */
    .auth-card {
      background: #16161d;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .auth-card.logged-in { border-color: #3a603a; background: #111a11; }
    .auth-text { font-size: 0.8rem; font-weight: 600; color: #6b7190; flex: 1; }
    .auth-card.logged-in .auth-text { color: #6ddf6d; }
    .auth-login-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      color: #e8eaf0;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .auth-login-btn:hover { background: #2a2a38; }
    .auth-logout-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      color: #6b7190;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .auth-logout-btn:hover { background: #2a2a38; }
  </style>
</head>
<body>

<header>
  <h1>📱 家電ランキング アフィリエイト投稿ジェネレーター</h1>
  <p>楽天家電ランキングから高単価商品をワンクリックで取得</p>
  <div class="badge-strip">
    <span class="badge badge-elec">家電・PC専用</span>
    <span class="badge badge-price">¥20,000以上</span>
  </div>
</header>

<main>

  <!-- 認証カード -->
  <div class="auth-card" id="auth-card">
    <div class="auth-text" id="auth-text">Threadsにログインすると直接投稿できます</div>
    <a class="auth-login-btn" href="/auth" id="auth-login-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.04.569c-1.104-3.96-3.898-5.984-8.304-6.015-2.91.022-5.11.936-6.54 2.717C4.307 6.504 3.616 8.914 3.589 12c.027 3.086.718 5.496 2.057 7.164 1.43 1.783 3.631 2.698 6.54 2.717 2.623-.02 4.358-.631 5.8-2.045 1.647-1.613 1.618-3.593 1.09-4.798-.31-.71-.873-1.3-1.634-1.75-.192 1.352-.622 2.446-1.284 3.272-.886 1.102-2.14 1.704-3.73 1.789-1.202.065-2.361-.218-3.259-.801-1.063-.689-1.685-1.74-1.752-2.964-.065-1.19.408-2.285 1.33-3.082.88-.76 2.119-1.207 3.583-1.291a13.853 13.853 0 0 1 3.02.142c-.126-.742-.375-1.332-.75-1.757-.513-.586-1.308-.883-2.378-.892h-.018c-.852 0-1.979.33-2.638 1.025l-1.268-1.692C8.844 5.394 10.421 4.85 12.168 4.85h.026c3.41.03 5.435 1.972 5.623 5.445.073.063.144.127.214.194 1.042.976 1.763 2.27 2.091 3.739.438 1.96.15 4.46-1.815 6.37-1.878 1.827-4.207 2.383-7.121 2.402zM12.187 9.5c-.085 0-.17.002-.254.007-1.003.058-1.811.33-2.329.79-.45.39-.665.912-.635 1.516.03.54.315 1.003.838 1.34.612.398 1.43.574 2.303.527 1.017-.055 1.785-.467 2.28-1.222.37-.563.57-1.297.63-2.262a11.618 11.618 0 0 0-2.833-.696z"/></svg>
      Threadsでログイン
    </a>
    <button class="auth-logout-btn" id="auth-logout-btn" style="display:none" onclick="logout()">ログアウト</button>
  </div>

  <!-- 取得ボタン -->
  <button class="fetch-btn" id="fetch-btn" onclick="fetchRanking()">
    🏆 家電ランキング上位（¥20,000以上）を取得
  </button>

  <div class="status" id="status"></div>

  <!-- 商品カード -->
  <div class="product-card" id="product-card">
    <img class="product-img" id="product-img" src="" alt="商品画像">
    <div class="product-info">
      <div class="rank-badge" id="rank-badge">🥇 家電ランキング上位</div>
      <div class="product-name" id="product-name"></div>
      <span class="product-price" id="product-price"></span>
      <div class="product-meta">
        <span class="product-review" id="product-review"></span>
        <span class="product-shop"  id="product-shop"></span>
      </div>
    </div>
  </div>

  <!-- 投稿文カード -->
  <div class="post-card" id="post-card">
    <div class="post-card-label">投稿文（編集できます）</div>
    <textarea id="post-text" oninput="updateCharCount()"></textarea>
    <div class="char-row">
      <button class="regen-btn" onclick="regeneratePost()">↺ 再生成</button>
      <span class="char-count" id="char-count">0 / 500文字</span>
    </div>
    <div class="aff-link" id="aff-link-preview"></div>
    <div class="btn-row">
      <button class="copy-btn" id="copy-btn" onclick="copyPost()">📋 コピー</button>
      <button class="threads-btn" onclick="openThreads()">
        <svg class="threads-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.04.569c-1.104-3.96-3.898-5.984-8.304-6.015-2.91.022-5.11.936-6.54 2.717C4.307 6.504 3.616 8.914 3.589 12c.027 3.086.718 5.496 2.057 7.164 1.43 1.783 3.631 2.698 6.54 2.717 2.623-.02 4.358-.631 5.8-2.045 1.647-1.613 1.618-3.593 1.09-4.798-.31-.71-.873-1.3-1.634-1.75-.192 1.352-.622 2.446-1.284 3.272-.886 1.102-2.14 1.704-3.73 1.789-1.202.065-2.361-.218-3.259-.801-1.063-.689-1.685-1.74-1.752-2.964-.065-1.19.408-2.285 1.33-3.082.88-.76 2.119-1.207 3.583-1.291a13.853 13.853 0 0 1 3.02.142c-.126-.742-.375-1.332-.75-1.757-.513-.586-1.308-.883-2.378-.892h-.018c-.852 0-1.979.33-2.638 1.025l-1.268-1.692C8.844 5.394 10.421 4.85 12.168 4.85h.026c3.41.03 5.435 1.972 5.623 5.445.073.063.144.127.214.194 1.042.976 1.763 2.27 2.091 3.739.438 1.96.15 4.46-1.815 6.37-1.878 1.827-4.207 2.383-7.121 2.402zM12.187 9.5c-.085 0-.17.002-.254.007-1.003.058-1.811.33-2.329.79-.45.39-.665.912-.635 1.516.03.54.315 1.003.838 1.34.612.398 1.43.574 2.303.527 1.017-.055 1.785-.467 2.28-1.222.37-.563.57-1.297.63-2.262a11.618 11.618 0 0 0-2.833-.696z"/>
        </svg>
        Threads で投稿
      </button>
    </div>
  </div>

</main>

<script>
  let currentItem = null;
  let itemPool    = []; // 取得済み商品プール

  function setLoading(on) {
    const btn = document.getElementById('fetch-btn');
    btn.disabled = on;
    btn.textContent = on ? '⏳ 取得中...' : '🔀 別の商品を表示';
  }

  async function fetchRanking() {
    const status = document.getElementById('status');

    // プールに商品があればAPIを叩かずランダム表示
    if (itemPool.length > 0) {
      pickRandom();
      return;
    }

    setLoading(true);
    status.textContent = '楽天APIにアクセスしています...';
    status.className = 'status';
    document.getElementById('product-card').classList.remove('visible');
    document.getElementById('post-card').classList.remove('visible');

    try {
      const res = await fetch('/api/ranking');
      const data = await res.json();
      setLoading(false);
      handleData(data);
    } catch (e) {
      setLoading(false);
      showError(`通信エラー: ${e.message}`);
    }
  }

  function handleData(data) {
    if (data?.error) {
      const msg = data.message || data.detail?.error_description || data.error;
      showError(`APIエラー: ${msg}`);
      return;
    }
    if (!data?.Items?.length) {
      showError('¥20,000以上の商品が見つかりませんでした。時間をおいて再試行してください。');
      return;
    }

    // 全件プールに保存してランダム表示
    itemPool = data.Items.map(i => i.Item ?? i);
    pickRandom();
  }

  function pickRandom() {
    const idx = Math.floor(Math.random() * itemPool.length);
    currentItem = itemPool[idx];
    renderProduct(currentItem);
    renderPost(currentItem);
    const btn = document.getElementById('fetch-btn');
    btn.disabled = false;
    btn.textContent = '🔀 別の商品を表示';
    document.getElementById('status').textContent = `✅ ${itemPool.length}件中からランダム表示中。ボタンで切り替えられます。`;
  }

  function renderProduct(item) {
    const img   = item.mediumImageUrls?.[0]?.imageUrl ?? '';
    const price = Number(item.itemPrice).toLocaleString('ja-JP');
    const rank  = item.rank ?? '';

    document.getElementById('product-img').src           = img;
    document.getElementById('product-name').textContent  = item.itemName;
    document.getElementById('product-price').textContent = `¥${price}（税込）`;
    document.getElementById('product-review').textContent =
      item.reviewAverage > 0 ? `⭐ ${item.reviewAverage}（${Number(item.reviewCount).toLocaleString()}件）` : '';
    document.getElementById('product-shop').textContent  = `🏪 ${item.shopName}`;
    document.getElementById('rank-badge').textContent    = rank ? `🥇 家電ランキング ${rank}位` : '🥇 家電ランキング上位';
    document.getElementById('product-card').classList.add('visible');
  }

  function buildPostText(item) {
    const name    = item.itemName;
    const short   = name.length > 50 ? name.slice(0, 50) + '…' : name;
    const price   = Number(item.itemPrice).toLocaleString('ja-JP');
    const affUrl  = item.affiliateUrl || item.itemUrl || '';
    const rank    = item.rank ? `楽天家電ランキング${item.rank}位！` : '楽天家電ランキング上位！';
    const review  = item.reviewAverage > 0
      ? `⭐ ${item.reviewAverage} / 5.0（${Number(item.reviewCount).toLocaleString()}件のレビュー）`
      : '';

    return [
      `📱 ${rank}`,
      '',
      `【${short}】`,
      '',
      `💰 ¥${price}（税込）`,
      review,
      `🏪 ${item.shopName}`,
      '',
      '高コスパ・高評価で話題の家電！',
      '気になる方はチェック👇',
      affUrl,
      '',
      '#楽天市場 #家電 #ガジェット #おすすめ家電 #ランキング',
    ].filter(l => l !== undefined).join('\n').replace(/\n{3,}/g, '\n\n');
  }

  function renderPost(item) {
    const text   = buildPostText(item);
    const affUrl = item.affiliateUrl || item.itemUrl || '';

    document.getElementById('post-text').value = text;
    const preview = document.getElementById('aff-link-preview');
    preview.innerHTML = affUrl
      ? `🔗 アフィリエイトリンク: <a href="${affUrl}" target="_blank" rel="noopener">${affUrl}</a>`
      : '';
    document.getElementById('post-card').classList.add('visible');
    updateCharCount();
  }

  function regeneratePost() {
    if (currentItem) renderPost(currentItem);
  }

  function updateCharCount() {
    const len = document.getElementById('post-text').value.length;
    const el  = document.getElementById('char-count');
    el.textContent = `${len} / 500文字`;
    el.className = len > 500 ? 'char-count over' : len > 400 ? 'char-count warn' : 'char-count';
  }

  function copyPost() {
    const text = document.getElementById('post-text').value;
    const btn  = document.getElementById('copy-btn');
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  async function openThreads() {
    const text   = document.getElementById('post-text').value;
    const token  = localStorage.getItem('threads_token');
    const userId = localStorage.getItem('threads_user_id');
    const btn    = document.querySelector('.threads-btn');

    if (!token || !userId) {
      window.open(`https://www.threads.net/intent/post?text=${encodeURIComponent(text)}`, '_blank');
      return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ 投稿中...';

    try {
      const res = await fetch('/api/threads-post', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, token, userId }),
      });
      const data = await res.json();
      if (data.success) {
        btn.textContent = '✅ 投稿完了！';
        setTimeout(() => { btn.innerHTML = '<svg class="threads-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.04.569c-1.104-3.96-3.898-5.984-8.304-6.015-2.91.022-5.11.936-6.54 2.717C4.307 6.504 3.616 8.914 3.589 12c.027 3.086.718 5.496 2.057 7.164 1.43 1.783 3.631 2.698 6.54 2.717 2.623-.02 4.358-.631 5.8-2.045 1.647-1.613 1.618-3.593 1.09-4.798-.31-.71-.873-1.3-1.634-1.75-.192 1.352-.622 2.446-1.284 3.272-.886 1.102-2.14 1.704-3.73 1.789-1.202.065-2.361-.218-3.259-.801-1.063-.689-1.685-1.74-1.752-2.964-.065-1.19.408-2.285 1.33-3.082.88-.76 2.119-1.207 3.583-1.291a13.853 13.853 0 0 1 3.02.142c-.126-.742-.375-1.332-.75-1.757-.513-.586-1.308-.883-2.378-.892h-.018c-.852 0-1.979.33-2.638 1.025l-1.268-1.692C8.844 5.394 10.421 4.85 12.168 4.85h.026c3.41.03 5.435 1.972 5.623 5.445.073.063.144.127.214.194 1.042.976 1.763 2.27 2.091 3.739.438 1.96.15 4.46-1.815 6.37-1.878 1.827-4.207 2.383-7.121 2.402zM12.187 9.5c-.085 0-.17.002-.254.007-1.003.058-1.811.33-2.329.79-.45.39-.665.912-.635 1.516.03.54.315 1.003.838 1.34.612.398 1.43.574 2.303.527 1.017-.055 1.785-.467 2.28-1.222.37-.563.57-1.297.63-2.262a11.618 11.618 0 0 0-2.833-.696z"/></svg> Threads で投稿'; btn.disabled = false; }, 3000);
      } else {
        throw new Error(data.error || '不明なエラー');
      }
    } catch (e) {
      btn.textContent = '❌ 投稿失敗';
      setTimeout(() => { btn.textContent = 'Threads で投稿'; btn.disabled = false; }, 3000);
      showError('投稿エラー: ' + e.message);
    }
  }

  function checkAuthStatus() {
    const token  = localStorage.getItem('threads_token');
    const userId = localStorage.getItem('threads_user_id');
    const card   = document.getElementById('auth-card');
    const text   = document.getElementById('auth-text');
    const loginBtn  = document.getElementById('auth-login-btn');
    const logoutBtn = document.getElementById('auth-logout-btn');

    if (token && userId) {
      card.classList.add('logged-in');
      text.textContent = `✅ Threadsログイン済み（ID: ${userId}）`;
      loginBtn.style.display  = 'none';
      logoutBtn.style.display = 'inline-block';
    } else {
      card.classList.remove('logged-in');
      text.textContent = 'Threadsにログインすると直接投稿できます';
      loginBtn.style.display  = 'inline-flex';
      logoutBtn.style.display = 'none';
    }
  }

  function logout() {
    localStorage.removeItem('threads_token');
    localStorage.removeItem('threads_user_id');
    checkAuthStatus();
  }

  function showError(msg) {
    const el = document.getElementById('status');
    el.textContent = '❌ ' + msg;
    el.className = 'status error';
  }

  checkAuthStatus();
</script>
</body>
</html>
